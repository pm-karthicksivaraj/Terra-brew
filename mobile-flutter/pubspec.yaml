name: terrabrew_coffee
description: "TerraBrew Coffee - EUDR Compliance & Traceability Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # QR & Barcode
  mobile_scanner: ^6.0.7
  qr_flutter: ^4.1.0

  # UI Components
  flutter_svg: ^2.1.0+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_down_button: ^0.10.1
  badges: ^3.1.2
  percent_indicator: ^4.2.4
  fl_chart: ^0.70.2
  intl: ^0.20.2
  timeago: ^3.7.0

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  file_picker: ^9.2.3
  permission_handler: ^11.4.0

  # GeoJSON
  geojson_vi: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
